<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة P2P - QR Code</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        h1 span {
            color: #00d4ff;
        }
        .id-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .id-box label {
            color: #aaa;
            font-size: 14px;
        }
        .id-box .id-value {
            color: #00d4ff;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            display: block;
            margin-top: 5px;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        .qr-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            display: none;
            text-align: center;
        }
        .qr-container img {
            max-width: 100%;
            width: 200px;
            height: 200px;
        }
        .qr-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: #00d4ff;
            color: #fff;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-danger {
            background: #ff4757;
            color: #fff;
        }
        .btn-danger:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
        }
        .chat-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            height: 200px;
            overflow-y: auto;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-box::-webkit-scrollbar {
            width: 4px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }
        .message {
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .message.self {
            background: #00d4ff;
            color: #fff;
            margin-left: auto;
        }
        .message.other {
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            margin-right: auto;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #00d4ff;
        }
        .input-area input::placeholder {
            color: #666;
        }
        .input-area button {
            padding: 12px 25px;
            border-radius: 15px;
            border: none;
            background: #00d4ff;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .input-area button:hover {
            transform: scale(1.05);
        }
        .input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .status {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin: 10px 0;
        }
        .status.connected {
            color: #00ff88;
        }
        .hint {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin: 10px 0;
        }
        .flex-btns {
            display: flex;
            gap: 10px;
        }
        .flex-btns .btn {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 <span>فجر</span> دردشة P2P</h1>

        <!-- معرف الجهاز -->
        <div class="id-box">
            <label>🆔 معرف جهازك:</label>
            <span class="id-value" id="myId">جاري التحميل...</span>
        </div>

        <!-- زر عرض QR Code -->
        <button class="btn btn-primary" onclick="showQR()">📱 عرض QR Code للاتصال</button>

        <!-- حاوية الـ QR -->
        <div class="qr-container" id="qrContainer">
            <img id="qrImage" src="" alt="QR Code">
            <p style="color: #333; margin-top: 10px; font-size: 13px;">
                📸 امسح الكود بكاميرا الموبايل لفتح الصفحة
            </p>
            <button class="btn btn-secondary" onclick="hideQR()">إخفاء QR</button>
        </div>

        <!-- حالة الاتصال -->
        <div class="status" id="status">⏳ غير متصل</div>

        <!-- شات -->
        <div class="chat-box" id="chatBox"></div>

        <!-- منطقة الإرسال -->
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="اكتب رسالتك..." disabled>
            <button id="sendBtn" disabled>إرسال</button>
        </div>

        <!-- أزرار إضافية -->
        <div class="flex-btns">
            <button class="btn btn-secondary" onclick="resetConnection()">🔄 إعادة تعيين</button>
            <button class="btn btn-secondary" onclick="copyId()">📋 نسخ المعرف</button>
        </div>

        <div class="hint">
            💡 امسح QR Code من جهاز تاني، أو انسخ المعرف وأدخله يدوياً
        </div>
    </div>

    <!-- مكتبة QR Code (تُحمّل من الإنترنت) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- مكتبة PeerJS للـ P2P -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // =============================================
        //  نظام الدردشة P2P مع QR Code
        // =============================================

        // --- المتغيرات ---
        const peer = new Peer();
        let conn = null;
        let myId = '';
        let qrCodeInstance = null;

        // عناصر الواجهة
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');
        const myIdEl = document.getElementById('myId');
        const qrContainer = document.getElementById('qrContainer');
        const qrImage = document.getElementById('qrImage');

        // --- إضافة رسالة للشات ---
        function addMessage(text, type = 'self') {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `${text} <span style="font-size:10px;opacity:0.6;display:block;margin-top:3px;">${time}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- تحديث الحالة ---
        function setStatus(text, isConnected = false) {
            statusEl.textContent = text;
            if (isConnected) {
                statusEl.className = 'status connected';
                msgInput.disabled = false;
                sendBtn.disabled = false;
            } else {
                statusEl.className = 'status';
                msgInput.disabled = true;
                sendBtn.disabled = true;
            }
        }

        // --- نسخ المعرف ---
        function copyId() {
            if (!myId) return;
            navigator.clipboard.writeText(myId).then(() => {
                addMessage(`📋 تم نسخ المعرف: ${myId}`, 'other');
            }).catch(() => {
                // طريقة بديلة
                const textarea = document.createElement('textarea');
                textarea.value = myId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
                addMessage(`📋 تم نسخ المعرف: ${myId}`, 'other');
            });
        }

        // --- عرض QR Code ---
        function showQR() {
            if (!myId) {
                alert('⚠️ انتظر حتى يظهر معرفك أولاً!');
                return;
            }

            // الرابط اللي هيظهر في الـ QR
            // ده رابط الصفحة الحالية مع المعرف مضافاً في الـ URL
            const url = window.location.href.split('?')[0] + '?peer=' + myId;

            qrContainer.classList.add('active');

            // لو الـ QR موجود قبل كده، امسحه
            if (qrCodeInstance) {
                qrCodeInstance.clear();
                qrCodeInstance = null;
            }

            // إنشاء QR Code جديد
            qrCodeInstance = new QRCode(qrImage, {
                text: url,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            addMessage(`📱 تم إنشاء QR Code للاتصال`, 'other');
        }

        // --- إخفاء QR ---
        function hideQR() {
            qrContainer.classList.remove('active');
        }

        // --- إعادة تعيين ---
        function resetConnection() {
            if (conn) {
                conn.close();
                conn = null;
            }
            setStatus('🔄 تم إعادة التعيين', false);
            addMessage('🔄 تم إعادة تعيين الاتصال', 'other');
            // مش بنمسح الشات عشان نحتفظ بالسجل
        }

        // --- الاتصال بجهاز آخر (يدوياً) ---
        function connectToPeer(peerId) {
            if (!peerId) {
                peerId = prompt('📌 أدخل معرف الجهاز الآخر:');
                if (!peerId) return;
            }

            if (conn) {
                conn.close();
                conn = null;
            }

            setStatus('🔄 جاري الاتصال...', false);
            addMessage(`📡 محاولة الاتصال بـ ${peerId}...`, 'other');

            conn = peer.connect(peerId);

            conn.on('open', () => {
                setStatus('✅ متصل!', true);
                addMessage('🔗 تم الاتصال بالجهاز الآخر!', 'other');
            });

            conn.on('data', (data) => {
                addMessage(data, 'other');
            });

            conn.on('close', () => {
                setStatus('❌ تم قطع الاتصال', false);
                addMessage('❌ انقطع الاتصال بالجهاز الآخر', 'other');
            });

            conn.on('error', (err) => {
                setStatus('❌ فشل الاتصال', false);
                addMessage(`❌ خطأ: ${err.message}`, 'other');
            });
        }

        // --- إرسال رسالة ---
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            if (!conn || conn.open === false) {
                addMessage('⚠️ مش متصل!', 'other');
                return;
            }

            conn.send(text);
            addMessage(text, 'self');
            msgInput.value = '';
        }

        // --- التهيئة ---
        function init() {
            // التعامل مع PeerJS
            peer.on('open', (id) => {
                myId = id;
                myIdEl.textContent = id;
                setStatus('⏳ غير متصل. امسح QR أو أدخل معرف الآخر', false);
                addMessage(`🌟 مرحباً! معرفك: ${id}`, 'other');
                addMessage('📱 اضغط "عرض QR Code" عشان تشارك مع جهاز تاني', 'other');
            });

            // استقبال اتصال من جهاز آخر
            peer.on('connection', (connection) => {
                // لو في اتصال قديم، اقفله
                if (conn) {
                    conn.close();
                }

                conn = connection;
                setStatus('✅ متصل!', true);
                addMessage('🔗 تم الاتصال بالجهاز الآخر!', 'other');

                conn.on('data', (data) => {
                    addMessage(data, 'other');
                });

                conn.on('close', () => {
                    setStatus('❌ تم قطع الاتصال', false);
                    addMessage('❌ انقطع الاتصال بالجهاز الآخر', 'other');
                });

                conn.on('error', (err) => {
                    setStatus('❌ فشل الاتصال', false);
                    addMessage(`❌ خطأ: ${err.message}`, 'other');
                });
            });

            peer.on('error', (err) => {
                console.error('Peer error:', err);
                // لو الخطأ إن المعرف مش موجود، دي مش مشكلة كبيرة
                if (err.message.includes('ID')) {
                    // عادي
                } else {
                    addMessage(`⚠️ خطأ: ${err.message}`, 'other');
                }
            });

            // أحداث الأزرار
            sendBtn.onclick = sendMessage;
            msgInput.onkeydown = (e) => {
                if (e.key === 'Enter') sendMessage();
            };

            // التحقق من وجود معرّف في الـ URL (لو جه من QR Code)
            const urlParams = new URLSearchParams(window.location.search);
            const peerId = urlParams.get('peer');
            if (peerId && peerId !== myId) {
                setTimeout(() => {
                    connectToPeer(peerId);
                }, 2000);
            }
        }

        // --- بدء التشغيل ---
        init();

        // جعل الدوال عالمية عشان تستخدم في الـ HTML
        window.showQR = showQR;
        window.hideQR = hideQR;
        window.resetConnection = resetConnection;
        window.copyId = copyId;
    </script>
</body>
</html>
