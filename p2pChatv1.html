<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة P2P فجر 🚀</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        h1 span {
            color: #00d4ff;
        }
        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        #status {
            color: #aaa;
            font-size: 14px;
        }
        #status.connected {
            color: #00ff88;
        }
        #deviceId {
            color: #00d4ff;
            font-size: 12px;
            background: rgba(0, 212, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .chat-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-box::-webkit-scrollbar {
            width: 4px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }
        .message {
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .message.self {
            background: #00d4ff;
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .message.other {
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            display: block;
            margin-top: 5px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        #messageInput:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }
        #messageInput::placeholder {
            color: #666;
        }
        #sendBtn {
            padding: 15px 30px;
            border-radius: 25px;
            border: none;
            background: #00d4ff;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        #sendBtn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .share-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .share-area button {
            flex: 1;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }
        .share-area button:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 500px) {
            .container {
                padding: 15px;
            }
            #messageInput {
                font-size: 14px;
                padding: 12px 15px;
            }
            #sendBtn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 <span>فجر</span> دردشة P2P</h1>

        <div class="status-box">
            <span id="status">⏳ جاري التجهيز...</span>
            <span id="deviceId">🆔 ...</span>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." disabled>
            <button id="sendBtn" disabled>إرسال</button>
        </div>

        <div class="share-area">
            <button id="copyIdBtn">📋 نسخ المعرف</button>
            <button id="connectBtn">🔗 الاتصال بجهاز آخر</button>
            <button id="resetBtn">🔄 إعادة تعيين</button>
        </div>
    </div>

    <script>
        // =============================================
        //  نظام الدردشة P2P باستخدام WebRTC
        //  يعمل على نفس الشبكة (Wi-Fi) بدون سيرفرات
        // =============================================

        // --- المتغيرات العامة ---
        let peerConnection = null;
        let dataChannel = null;
        let isInitiator = false; // هل أنا اللي بدأت الاتصال؟
        let localId = '';
        let remoteId = '';
        let pendingCandidates = [];

        // عناصر الواجهة
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');
        const deviceIdEl = document.getElementById('deviceId');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const connectBtn = document.getElementById('connectBtn');
        const resetBtn = document.getElementById('resetBtn');

        // --- توليد معرف فريد للجهاز ---
        function generateId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // --- إضافة رسالة للشات ---
        function addMessage(text, type = 'self') {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `${text} <span class="time">${time}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- تحديث حالة الاتصال ---
        function setStatus(text, isConnected = false) {
            statusEl.textContent = text;
            if (isConnected) {
                statusEl.className = 'connected';
                messageInput.disabled = false;
                sendBtn.disabled = false;
            } else {
                statusEl.className = '';
                messageInput.disabled = true;
                sendBtn.disabled = true;
            }
        }

        // --- إنشاء اتصال WebRTC ---
        function createPeerConnection() {
            const config = {
                iceServers: [
                    // خوادم STUN مجانية لمساعدتهم في التعارف
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            };

            peerConnection = new RTCPeerConnection(config);

            // التعامل مع المرشحات (candidates) القادمة
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    // إذا كنت البادئ، خزن الـ candidates لحد ما القناة تفتح
                    if (isInitiator && dataChannel && dataChannel.readyState === 'open') {
                        sendCandidate(event.candidate);
                    } else if (isInitiator) {
                        pendingCandidates.push(event.candidate);
                    } else {
                        // لو أنا المستقبل، ابعتهم فوراً عبر الـ offer
                        sendCandidate(event.candidate);
                    }
                }
            };

            // عند استلام قناة بيانات من الطرف الآخر (لو أنا المستقبل)
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel();
                setStatus('✅ متصل!', true);
                addMessage('🔗 تم الاتصال بالجهاز الآخر!', 'other');
            };

            return peerConnection;
        }

        // --- إعداد قناة البيانات ---
        function setupDataChannel() {
            if (!dataChannel) return;

            dataChannel.onopen = () => {
                setStatus('✅ متصل!', true);
                addMessage('🔗 تم فتح قناة الاتصال!', 'other');
                // إرسال أي Candidates معلقة
                while (pendingCandidates.length > 0) {
                    const candidate = pendingCandidates.pop();
                    sendCandidate(candidate);
                }
            };

            dataChannel.onclose = () => {
                setStatus('❌ تم قطع الاتصال', false);
                addMessage('❌ انقطع الاتصال بالجهاز الآخر', 'other');
            };

            dataChannel.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'candidate') {
                    // استقبال مرشح (candidate) من الطرف الآخر
                    if (peerConnection) {
                        const candidate = new RTCIceCandidate(data.candidate);
                        peerConnection.addIceCandidate(candidate).catch(e => console.error(e));
                    }
                } else if (data.type === 'message') {
                    // استقبال رسالة نصية
                    addMessage(data.text, 'other');
                }
            };
        }

        // --- إرسال مرشح (candidate) ---
        function sendCandidate(candidate) {
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({
                    type: 'candidate',
                    candidate: candidate
                }));
            } else {
                // لو القناة لسه متفتحتش، خزنه مؤقتاً
                pendingCandidates.push(candidate);
            }
        }

        // --- إرسال رسالة نصية ---
        function sendMessage(text) {
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({
                    type: 'message',
                    text: text
                }));
                addMessage(text, 'self');
                messageInput.value = '';
            } else {
                addMessage('⚠️ مش متصل!', 'other');
            }
        }

        // --- بدء الاتصال (كبادئ) ---
        async function startConnection() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
                dataChannel = null;
            }

            isInitiator = true;
            setStatus('🔄 جاري الاتصال...', false);
            addMessage('📡 جاري إنشاء قناة اتصال...', 'other');

            const pc = createPeerConnection();

            // إنشاء قناة بيانات (هو اللي هيبدأ)
            dataChannel = pc.createDataChannel('chat');
            setupDataChannel();

            try {
                // إنشاء عرض (Offer)
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // تحويل الـ Offer لنص عشان نشاركه
                const offerText = JSON.stringify(pc.localDescription);
                addMessage(`📤 نسخ الرابط التالي وأرسله للجهاز الآخر:\n${offerText}`, 'other');

                // ننتظر الـ Answer من الطرف الآخر
                // هنضطر نستخدم طريقة يدوية: المستخدم يلصق الـ Answer في الـ prompt
                setTimeout(() => {
                    const answerText = prompt('📥 الصق الـ Answer من الجهاز الآخر هنا:');
                    if (answerText) {
                        try {
                            const answer = JSON.parse(answerText);
                            pc.setRemoteDescription(answer);
                            setStatus('✅ متصل!', true);
                            addMessage('✅ تم الاتصال بنجاح!', 'other');
                        } catch (e) {
                            addMessage('❌ خطأ في الـ Answer!', 'other');
                            setStatus('❌ فشل الاتصال', false);
                        }
                    }
                }, 1000);

            } catch (e) {
                console.error(e);
                addMessage('❌ فشل إنشاء الاتصال', 'other');
                setStatus('❌ فشل الاتصال', false);
            }
        }

        // --- استقبال اتصال (كمستقبل) ---
        async function receiveConnection(offerText) {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
                dataChannel = null;
            }

            isInitiator = false;
            setStatus('🔄 جاري الاستقبال...', false);
            addMessage('📥 جاري استقبال الاتصال...', 'other');

            const pc = createPeerConnection();

            try {
                const offer = JSON.parse(offerText);
                await pc.setRemoteDescription(offer);

                // إنشاء رد (Answer)
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                // عرض الـ Answer عشان ينسخه الطرف الآخر
                const answerText = JSON.stringify(pc.localDescription);
                addMessage(`📤 انسخ الـ Answer ده وأرسله للجهاز الأول:\n${answerText}`, 'other');

                setStatus('✅ متصل!', true);
                addMessage('✅ تم الاتصال بنجاح!', 'other');

            } catch (e) {
                console.error(e);
                addMessage('❌ فشل استقبال الاتصال', 'other');
                setStatus('❌ فشل الاتصال', false);
            }
        }

        // --- نسخ المعرف ---
        function copyId() {
            navigator.clipboard.writeText(localId).then(() => {
                addMessage(`📋 تم نسخ المعرف: ${localId}`, 'other');
            }).catch(() => {
                // طريقة بديلة للنسخ
                const textarea = document.createElement('textarea');
                textarea.value = localId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
                addMessage(`📋 تم نسخ المعرف: ${localId}`, 'other');
            });
        }

        // --- زر الاتصال ---
        function handleConnect() {
            if (!peerConnection || !dataChannel || dataChannel.readyState !== 'open') {
                // لو مش متصلين، نبدأ اتصال جديد
                const choice = confirm('هل تريد بدء اتصال جديد؟\nاضغط "موافق" إذا كنت تريد البدء (Initiator)\nاضغط "إلغاء" إذا كنت تريد الاستقبال (Receiver)');
                if (choice) {
                    startConnection();
                } else {
                    // المستخدم يلصق الـ Offer
                    const offerText = prompt('📥 الصق الـ Offer من الجهاز البادئ هنا:');
                    if (offerText) {
                        receiveConnection(offerText);
                    }
                }
            } else {
                addMessage('⚠️ أنت متصل بالفعل!', 'other');
            }
        }

        // --- إعادة التعيين ---
        function resetConnection() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
                dataChannel = null;
            }
            pendingCandidates = [];
            isInitiator = false;
            setStatus('🔄 تم إعادة التعيين', false);
            addMessage('🔄 تم إعادة تعيين الاتصال', 'other');
            chatBox.innerHTML = '';
        }

        // --- التهيئة ---
        function init() {
            localId = generateId();
            deviceIdEl.textContent = `🆔 ${localId}`;
            setStatus('⏳ غير متصل. اضغط "اتصال" للبدء', false);

            // أحداث الأزرار
            copyIdBtn.onclick = copyId;
            connectBtn.onclick = handleConnect;
            resetBtn.onclick = resetConnection;

            // إرسال الرسالة
            sendBtn.onclick = () => {
                const text = messageInput.value.trim();
                if (text) sendMessage(text);
            };

            messageInput.onkeydown = (e) => {
                if (e.key === 'Enter') sendBtn.click();
            };

            // رسالة ترحيب
            addMessage(`🌟 مرحباً! معرفك: ${localId}`, 'other');
            addMessage('📌 اضغط "اتصال" لبدء الدردشة مع جهاز آخر على نفس الشبكة', 'other');
        }

        // --- بدء التشغيل ---
        init();
    </script>
</body>
</html>
